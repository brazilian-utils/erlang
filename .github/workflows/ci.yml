name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        otp: ['25', '26', '27']

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24.0'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

      - name: EUnit
        run: rebar3 eunit

      - name: PropEr
        run: rebar3 proper -n 200

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: EDoc
        run: rebar3 edoc
